name: Auto_Sync_Packages

on:
  push:
    paths:
      - '.github/workflows/wall.yml'
      - '.github/diy/main.sh'
      - '.github/mysh/my.sh'
      - '.github/mysh/edit_main.sh'
  schedule:
    - cron: '0 */8 * * *'
  repository_dispatch:
  workflow_dispatch:
    inputs:
      packages:
        description: 'packages'
        required: false
        default: 'false'	

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id || github.event.sender.id == null
    runs-on: ubuntu-latest

    name: Update ${{matrix.target}}
    strategy:
      fail-fast: false
      matrix:
        target: [main]

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Initialization environment
      run: |
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        sudo timedatectl set-timezone "Asia/Shanghai"
        
    - name: Clone packages
      run: |
        chmod +x .github/diy/${{matrix.target}}.sh
        chmod +x .github/mysh/my.sh .github/mysh/edit_main.sh        
        git clone -b ${{matrix.target}} https://github.com/gxnas/openwrt-package.git ${{matrix.target}}
        cd ${{matrix.target}}
        find . -type d ! -name "diy" ! -name "mysh" -exec rm -rf {} +
        bash $GITHUB_WORKSPACE/.github/diy/convert_translation.sh
        bash $GITHUB_WORKSPACE/.github/diy/create_acl_for_luci.sh -a
        bash $GITHUB_WORKSPACE/.github/diy/Modify.sh

    - name: Upload
      env: 
        ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
      run: |
        [ -e $GITHUB_WORKSPACE/LICENSE ] && cp $GITHUB_WORKSPACE/LICENSE $GITHUB_WORKSPACE/${{matrix.target}}
        [ -e $GITHUB_WORKSPACE/README.md ] && cp $GITHUB_WORKSPACE/README.md $GITHUB_WORKSPACE/${{matrix.target}}
        cd $GITHUB_WORKSPACE/${{matrix.target}}
        if git status --porcelain | grep .; then
          git add .
          git commit -am "update $(date '+%Y-%m-%d %H:%M:%S')"
          git push --quiet "https://${{ secrets.ACCESS_TOKEN }}@github.com/gxnas/openwrt-package.git" HEAD:${{matrix.target}} || exit 1
        else
          echo "nothing to commit"
        fi

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 1
